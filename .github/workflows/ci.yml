name: Rezumix Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Build
        env:
          GEMINI_API_KEY: "dummy_key_for_ci_build"
          MONGODB_URI: "mongodb://localhost:27017/rezumix_test"
          JWT_SECRET: "dummy_jwt_secret_key_minimum_32_characters_long"
        run: npm run build
